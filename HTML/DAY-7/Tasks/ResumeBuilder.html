<!DOCTYPE html>
<html>

<head>
    <title>Resume Builder Form</title>
</head>

<body>
    <center>
        <h1>Resume Builder Form</h1>

        <form>

            <h3>Personal Details</h3>

            <label>Full Name:</label><br>
            <input type="text" placeholder="Enter name">
            <br><br>

            <label>Email:</label><br>
            <input type="email" placeholder="Enter email">
            <br><br>

            <label>Phone Number:</label><br>
            <input type="tel" maxlength="10">
            <hr>

            <br>

            <h3>Education</h3>

            <label>College Name:</label><br>
            <input type="text">
            <br><br>

            <label>Department:</label><br>

            <select>
                <option>CSE</option>
                <option>IT</option>
                <option>ECE</option>
            </select>
            <hr>
            <br>

            <h3>Skills</h3>

            <input type="checkbox">
            <label>HTML</label>

            <input type="checkbox">
            <label>CSS</label>

            <input type="checkbox">
            <label>JavaScript</label>
            <hr>
            <br>

            <h3>Experience</h3>

            <textarea rows="4" cols="30" placeholder="Enter experience"></textarea>

            <br>
            <hr>

            <h3>Upload Resume</h3>

            <input type="file">

            <br><br>

            <input type="submit" value="Submit">
            <input type="reset" value="Clear">

        </form>
    </center>
</body>

</html>
