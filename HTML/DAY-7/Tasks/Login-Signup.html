<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-SignUp page</title>
</head>

<body>
    <section>

        <div>
            <center>
                <h1>Login Form</h1>

                <form action="">
                    <label for="uname">Username :</label> <br> <input type="text" placeholder="Enter username.."
                        required id="uname"> <br> <br>
                    <label for="pwd">Password :</label> <br> <input type="password" maxlength="12" id="pwd"
                        placeholder="Enter password.." required> <br> <br>
                    <input type="checkbox"><span>Remember Me</span> <br>
                    <input type="submit" value="Login">
                </form>
            </center>
        </div> <br>
        <hr>

        <div>
            <center>
                <h1>SignUp Form</h1>

                <form action="">
                    <label for="fname">Full Name:</label> <br> <input type="text" placeholder="Enter username.."
                        required id="fname"> <br> <br>
                    <label for="email">Email:</label> <br> <input type="email" id="email"
                        placeholder="create password.." required> <br> <br>
                    <label for="pwd2">Password :</label> <br> <input type="password" maxlength="12" id="pwd2"
                        placeholder="create password.." required> <br> <br>
                    <label for="phone">Phone Number:</label> <br> <input type="tel" placeholder="Enter 10 digit number"
                        minlength="10" maxlength="10" id="phone"> <br> <br>

                    <label for="">Gender:</label> <br>
                    <input type="radio">Male <input type="radio">Female <input type="radio">Other <br> <br>
                    <input type="submit" value="Create Account">
                </form>
            </center>
        </div>
    </section>
    <hr>
</body>

</html>
